<style>
:root {
  --bg: #f5f4f0;
  --surface: #ffffff;
  --surface2: #f0ede8;
  --border: rgba(0,0,0,0.08);
  --border2: rgba(0,0,0,0.14);
  --text: #1a1a1a;
  --text2: #6b6760;
  --text3: #a09c97;
  --green: #1D9E75;
  --green-dark: #0F6E56;
  --green-light: #e8f7f2;
  --amber: #c97c1a;
  --amber-light: #fef3e0;
  --red: #c53030;
  --red-light: #fdecea;
  --blue: #2563eb;
  --radius: 14px;
  --radius-sm: 8px;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'DM Sans', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }

header {
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  padding: 0 20px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  height: 56px;
  position: sticky;
  top: 0;
  z-index: 100;
}
.logo { font-size: 15px; font-weight: 600; color: var(--text); letter-spacing: -0.3px; }
.logo span { color: var(--green); }
.month-label { font-size: 13px; color: var(--text2); font-family: 'DM Mono', monospace; }

nav {
  display: flex;
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  padding: 0 20px;
  gap: 0;
  overflow-x: auto;
}
nav button {
  background: none; border: none; border-bottom: 2px solid transparent;
  padding: 12px 16px; font-size: 13px; font-weight: 500; color: var(--text2);
  cursor: pointer; white-space: nowrap; font-family: 'DM Sans', sans-serif;
  transition: color 0.15s;
}
nav button.active { color: var(--green); border-bottom-color: var(--green); }
nav button:hover:not(.active) { color: var(--text); }

main { padding: 20px; max-width: 640px; margin: 0 auto; }

.page { display: none; }
.page.active { display: block; }

.metrics { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; margin-bottom: 16px; }
.metric {
  background: var(--surface); border-radius: var(--radius); padding: 14px 16px;
  border: 1px solid var(--border);
}
.metric-label { font-size: 11px; font-weight: 500; color: var(--text3); text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 6px; }
.metric-value { font-size: 22px; font-weight: 600; color: var(--text); letter-spacing: -0.5px; font-family: 'DM Mono', monospace; }
.metric-value.warn { color: var(--amber); }
.metric-value.danger { color: var(--red); }

.alert {
  border-radius: var(--radius-sm); padding: 10px 14px; margin-bottom: 10px;
  font-size: 13px; font-weight: 500; border: 1px solid;
}
.alert.warn { background: var(--amber-light); color: #7a4a0a; border-color: #f0c07a; }
.alert.danger { background: var(--red-light); color: #8b1a1a; border-color: #f5a5a5; }

.section-label {
  font-size: 11px; font-weight: 600; color: var(--text3);
  text-transform: uppercase; letter-spacing: 0.07em;
  margin: 20px 0 10px;
}

.card {
  background: var(--surface); border-radius: var(--radius);
  border: 1px solid var(--border); overflow: hidden; margin-bottom: 10px;
}

.cat-item { padding: 12px 16px; border-bottom: 1px solid var(--border); }
.cat-item:last-child { border-bottom: none; }
.cat-header { display: flex; align-items: center; gap: 8px; margin-bottom: 6px; }
.cat-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
.cat-name { font-size: 13px; font-weight: 500; flex: 1; }
.cat-badge {
  font-size: 11px; font-weight: 600; padding: 2px 8px;
  border-radius: 20px; font-family: 'DM Mono', monospace;
}
.cat-badge.ok { background: #e8f7f2; color: #0a5c3f; }
.cat-badge.warn { background: var(--amber-light); color: #7a4a0a; }
.cat-badge.danger { background: var(--red-light); color: #8b1a1a; }
.cat-amounts { font-size: 12px; color: var(--text2); margin-bottom: 5px; font-family: 'DM Mono', monospace; }
.bar-bg { background: var(--surface2); border-radius: 4px; height: 4px; overflow: hidden; }
.bar-fill { height: 4px; border-radius: 4px; transition: width 0.4s ease; }

.exp-item { display: flex; justify-content: space-between; align-items: center; padding: 11px 16px; border-bottom: 1px solid var(--border); }
.exp-item:last-child { border-bottom: none; }
.exp-left { display: flex; flex-direction: column; gap: 2px; }
.exp-name { font-size: 14px; font-weight: 500; color: var(--text); }
.exp-meta { font-size: 11px; color: var(--text3); }
.exp-cat { display: inline-block; width: 6px; height: 6px; border-radius: 50%; margin-right: 4px; vertical-align: middle; }
.exp-val { font-size: 14px; font-weight: 600; color: var(--text); font-family: 'DM Mono', monospace; }
.exp-val.negative { color: var(--green); }

.form-card { background: var(--surface); border-radius: var(--radius); border: 1px solid var(--border); padding: 20px; }
.form-group { margin-bottom: 14px; }
.form-label { font-size: 12px; font-weight: 600; color: var(--text2); text-transform: uppercase; letter-spacing: 0.05em; display: block; margin-bottom: 6px; }
.form-control {
  width: 100%; padding: 10px 12px; border-radius: var(--radius-sm);
  border: 1px solid var(--border2); font-size: 14px; font-family: 'DM Sans', sans-serif;
  background: var(--surface); color: var(--text); outline: none;
  transition: border-color 0.15s;
}
.form-control:focus { border-color: var(--green); }
.form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
.btn-submit {
  width: 100%; padding: 12px; border-radius: var(--radius-sm);
  background: var(--green); color: #fff; border: none;
  font-size: 14px; font-weight: 600; font-family: 'DM Sans', sans-serif;
  cursor: pointer; transition: background 0.15s, transform 0.1s;
  margin-top: 4px;
}
.btn-submit:hover { background: var(--green-dark); }
.btn-submit:active { transform: scale(0.98); }

.who-toggle { display: flex; gap: 8px; }
.who-btn {
  flex: 1; padding: 10px; border-radius: var(--radius-sm);
  border: 1px solid var(--border2); background: var(--surface);
  font-size: 13px; font-weight: 500; cursor: pointer; font-family: 'DM Sans', sans-serif;
  color: var(--text2); transition: all 0.15s;
}
.who-btn.active { background: var(--green-light); border-color: var(--green); color: var(--green-dark); font-weight: 600; }

.budget-item { display: flex; align-items: center; gap: 10px; padding: 10px 0; border-bottom: 1px solid var(--border); }
.budget-item:last-child { border-bottom: none; }
.budget-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
.budget-name { font-size: 13px; font-weight: 500; flex: 1; }
.budget-input {
  width: 90px; padding: 6px 10px; border-radius: var(--radius-sm);
  border: 1px solid var(--border2); font-size: 13px; font-family: 'DM Mono', monospace;
  text-align: right; color: var(--text); outline: none;
}
.budget-input:focus { border-color: var(--green); }

.rep-person-block { padding: 12px 16px; }
.rep-person-name { font-size: 13px; font-weight: 600; color: var(--text); margin-bottom: 8px; }
.rep-row { display: flex; justify-content: space-between; padding: 5px 0; font-size: 13px; border-bottom: 1px solid var(--border); }
.rep-row:last-child { border-bottom: none; }
.rep-label { color: var(--text2); }
.rep-val { font-weight: 500; font-family: 'DM Mono', monospace; }

.divider { height: 1px; background: var(--border); margin: 0 16px; }

.empty { text-align: center; padding: 32px 20px; color: var(--text3); font-size: 14px; }

.delete-btn {
  background: none; border: none; color: var(--text3); cursor: pointer;
  font-size: 16px; padding: 0 0 0 8px; line-height: 1;
}
.delete-btn:hover { color: var(--red); }

.toast {
  position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%) translateY(80px);
  background: var(--text); color: #fff; padding: 10px 20px; border-radius: 20px;
  font-size: 13px; font-weight: 500; transition: transform 0.3s ease; z-index: 999;
  pointer-events: none;
}
.toast.show { transform: translateX(-50%) translateY(0); }
</style>
</head>
<body>

<header>
  <div class="logo">finanças <span>casal</span></div>
  <div class="month-label" id="month-label"></div>
</header>

<nav>
  <button class="active" onclick="showPage('dash',this)">Painel</button>
  <button onclick="showPage('add',this)">+ Registrar</button>
  <button onclick="showPage('budget',this)">Orçamento</button>
  <button onclick="showPage('report',this)">Relatório</button>
</nav>

<main>

<div id="dash" class="page active">
  <div class="metrics" id="dash-metrics"></div>
  <div id="dash-alerts"></div>
  <div class="section-label">por categoria</div>
  <div class="card" id="dash-cats"></div>
  <div class="section-label">últimos lançamentos</div>
  <div class="card" id="dash-recent"></div>
</div>

<div id="add" class="page">
  <div class="form-card">
    <div class="section-label" style="margin-top:0">quem pagou</div>
    <div class="who-toggle" style="margin-bottom:16px;">
      <button class="who-btn active" id="who-eu" onclick="setWho('Eu')">Eu</button>
      <button class="who-btn" id="who-esp" onclick="setWho('Esposa')">Esposa</button>
    </div>
    <div class="form-group">
      <label class="form-label">Descrição</label>
      <input class="form-control" id="inp-desc" placeholder="Ex: Mercado, Farmácia...">
    </div>
    <div class="form-row">
      <div class="form-group">
        <label class="form-label">Valor (R$)</label>
        <input class="form-control" id="inp-val" type="number" step="0.01" min="0" placeholder="0,00">
      </div>
      <div class="form-group">
        <label class="form-label">Data</label>
        <input class="form-control" id="inp-date" type="date">
      </div>
    </div>
    <div class="form-group">
      <label class="form-label">Categoria</label>
      <select class="form-control" id="inp-cat"></select>
    </div>
    <button class="btn-submit" onclick="addExpense()">Registrar gasto</button>
  </div>
</div>

<div id="budget" class="page">
  <div class="form-card">
    <div class="section-label" style="margin-top:0">limites mensais por categoria</div>
    <div id="budget-list"></div>
  </div>
  <div class="form-card" style="margin-top:12px;">
    <div class="section-label" style="margin-top:0">nova categoria</div>
    <div class="form-group">
      <label class="form-label">Nome</label>
      <input class="form-control" id="new-cat-name" placeholder="Ex: Lazer, Academia...">
    </div>
    <div class="form-row">
      <div class="form-group">
        <label class="form-label">Limite (R$)</label>
        <input class="form-control" id="new-cat-limit" type="number" placeholder="500">
      </div>
      <div class="form-group">
        <label class="form-label">Cor</label>
        <select class="form-control" id="new-cat-color">
          <option value="#1D9E75">Verde</option>
          <option value="#2563eb">Azul</option>
          <option value="#D85A30">Laranja</option>
          <option value="#7F77DD">Roxo</option>
          <option value="#D4537E">Rosa</option>
          <option value="#c97c1a">Âmbar</option>
          <option value="#888780">Cinza</option>
          <option value="#c53030">Vermelho</option>
        </select>
      </div>
    </div>
    <button class="btn-submit" onclick="addCategory()">Adicionar categoria</button>
  </div>
</div>

<div id="report" class="page">
  <div class="metrics" id="rep-metrics"></div>
  <div class="section-label">por pessoa</div>
  <div class="card" id="rep-person"></div>
  <div class="section-label">todos os lançamentos</div>
  <div class="card" id="rep-all"></div>
</div>

</main>

<div class="toast" id="toast"></div>

var state;
function loadState() {
  try {
    var raw = localStorage.getItem('financas-casal-v1');
    state = raw ? JSON.parse(raw) : JSON.parse(JSON.stringify(defaultState));
  } catch(e) {
    state = JSON.parse(JSON.stringify(defaultState));
  }
  state.expenses = state.expenses.filter(function(e){ return e.val !== 0; });
}
function saveState() {
  try { localStorage.setItem('financas-casal-v1', JSON.stringify(state)); } catch(e) {}
}

function fmt(v) {
  return 'R$ ' + parseFloat(v).toLocaleString('pt-BR', {minimumFractionDigits:2, maximumFractionDigits:2});
}
function catById(id) {
  return state.categories.find(function(c){ return c.id === id; }) || {name: id, color:'#888', limit:0};
}
function totalByCat(catId) {
  return state.expenses.filter(function(e){ return e.cat === catId; }).reduce(function(s,e){ return s+e.val; }, 0);
}
function totalByWho(who) {
  return state.expenses.filter(function(e){ return e.who === who; }).reduce(function(s,e){ return s+e.val; }, 0);
}

function showPage(id, btn) {
  document.querySelectorAll('.page').forEach(function(p){ p.classList.remove('active'); });
  document.querySelectorAll('nav button').forEach(function(b){ b.classList.remove('active'); });
  document.getElementById(id).classList.add('active');
  btn.classList.add('active');
  renderAll();
}

function setWho(who) {
  selectedWho = who;
  document.getElementById('who-eu').classList.toggle('active', who === 'Eu');
  document.getElementById('who-esp').classList.toggle('active', who === 'Esposa');
}

function showToast(msg) {
  var t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(function(){ t.classList.remove('show'); }, 2200);
}

function renderAll() { renderDash(); renderBudget(); renderReport(); }

function renderDash() {
  var total = state.expenses.reduce(function(s,e){ return s+e.val; }, 0);
  var totalLimit = state.categories.reduce(function(s,c){ return s+c.limit; }, 0);
  var pct = totalLimit > 0 ? Math.round(total/totalLimit*100) : 0;
  var cls = pct >= 100 ? 'danger' : pct >= 80 ? 'warn' : '';

  document.getElementById('dash-metrics').innerHTML =
    '<div class="metric"><div class="metric-label">Total gasto</div><div class="metric-value '+cls+'">'+fmt(total)+'</div></div>' +
    '<div class="metric"><div class="metric-label">Orçamento total</div><div class="metric-value">'+fmt(totalLimit)+'</div></div>' +
    '<div class="metric"><div class="metric-label">Utilizado</div><div class="metric-value '+cls+'">'+pct+'%</div></div>' +
    '<div class="metric"><div class="metric-label">Lançamentos</div><div class="metric-value">'+state.expenses.length+'</div></div>';

  var alerts = '';
  state.categories.forEach(function(c) {
    var spent = totalByCat(c.id);
    if (spent === 0) return;
    var p = c.limit > 0 ? spent/c.limit : 0;
    if (p >= 1) alerts += '<div class="alert danger">Limite estourado: <strong>'+c.name+'</strong> — '+fmt(spent)+' de '+fmt(c.limit)+'</div>';
    else if (p >= 0.8) alerts += '<div class="alert warn">Atenção: <strong>'+c.name+'</strong> em '+Math.round(p*100)+'% ('+fmt(spent)+' de '+fmt(c.limit)+')</div>';
  });
  document.getElementById('dash-alerts').innerHTML = alerts;

  var sorted = state.categories.slice().sort(function(a,b){ return totalByCat(b.id)-totalByCat(a.id); });
  var catsHtml = '';
  sorted.forEach(function(c) {
    var spent = totalByCat(c.id);
    if (spent <= 0) return;
    var p = c.limit > 0 ? Math.min(spent/c.limit, 1) : 0;
    var pPct = Math.round(p*100);
    var badgeCls = pPct >= 100 ? 'danger' : pPct >= 80 ? 'warn' : 'ok';
    var barColor = pPct >= 100 ? 'var(--red)' : pPct >= 80 ? 'var(--amber)' : c.color;
    catsHtml +=
      '<div class="cat-item">' +
        '<div class="cat-header">' +
          '<div class="cat-dot" style="background:'+c.color+'"></div>' +
          '<span class="cat-name">'+c.name+'</span>' +
          '<span class="cat-badge '+badgeCls+'">'+pPct+'%</span>' +
        '</div>' +
        '<div class="cat-amounts">'+fmt(spent)+' de '+fmt(c.limit)+'</div>' +
        '<div class="bar-bg"><div class="bar-fill" style="width:'+Math.round(p*100)+'%;background:'+barColor+'"></div></div>' +
      '</div>';
  });
  document.getElementById('dash-cats').innerHTML = catsHtml || '<div class="empty">Nenhum gasto registrado</div>';

  var recent = state.expenses.slice().sort(function(a,b){ return b.id-a.id; }).slice(0,6);
  var recentHtml = recent.map(function(e) {
    var c = catById(e.cat);
    var valCls = e.val < 0 ? 'negative' : '';
    return '<div class="exp-item">' +
      '<div class="exp-left">' +
        '<span class="exp-name">'+e.desc+'</span>' +
        '<span class="exp-meta"><span class="exp-cat" style="background:'+c.color+'"></span>'+e.who+' · '+e.date+'</span>' +
      '</div>' +
      '<span class="exp-val '+valCls+'">'+fmt(e.val)+'</span>' +
    '</div>';
  }).join('');
  document.getElementById('dash-recent').innerHTML = recentHtml || '<div class="empty">Nenhum lançamento</div>';
}

function renderBudget() {
  var html = '';
  state.categories.forEach(function(c) {
    html += '<div class="budget-item">' +
      '<div class="budget-dot" style="background:'+c.color+'"></div>' +
      '<span class="budget-name">'+c.name+'</span>' +
      '<input class="budget-input" type="number" value="'+c.limit+'" onchange="updateLimit(\''+c.id+'\',this.value)">' +
    '</div>';
  });
  document.getElementById('budget-list').innerHTML = html;
}

function updateLimit(id, val) {
  var c = state.categories.find(function(c){ return c.id === id; });
  if (c) { c.limit = parseFloat(val) || 0; saveState(); showToast('Limite atualizado'); }
}

function addCategory() {
  var name = document.getElementById('new-cat-name').value.trim();
  var limit = parseFloat(document.getElementById('new-cat-limit').value) || 0;
  var color = document.getElementById('new-cat-color').value;
  if (!name) { showToast('Digite um nome para a categoria'); return; }
  state.categories.push({id:'cat-'+Date.now(), name:name, color:color, limit:limit});
  document.getElementById('new-cat-name').value = '';
  document.getElementById('new-cat-limit').value = '';
  saveState(); populateCatSelect(); renderAll();
  showToast('Categoria adicionada');
}

function populateCatSelect() {
  var sel = document.getElementById('inp-cat');
  if (!sel) return;
  sel.innerHTML = state.categories.map(function(c){
    return '<option value="'+c.id+'">'+c.name+'</option>';
  }).join('');
}

function addExpense() {
  var desc = document.getElementById('inp-desc').value.trim();
  var val = parseFloat(document.getElementById('inp-val').value);
  var cat = document.getElementById('inp-cat').value;
  var date = document.getElementById('inp-date').value;
  if (!desc || !val || !date) { showToast('Preencha todos os campos'); return; }
  state.expenses.push({id: state.nextId++, who: selectedWho, desc:desc, val:val, cat:cat, date:date});
  saveState();
  document.getElementById('inp-desc').value = '';
  document.getElementById('inp-val').value = '';
  showToast('Gasto registrado');
  showPage('dash', document.querySelector('nav button'));
}

function renderReport() {
  var total = state.expenses.reduce(function(s,e){ return s+e.val; }, 0);
  var eu = totalByWho('Eu');
  var esp = totalByWho('Esposa');
  document.getElementById('rep-metrics').innerHTML =
    '<div class="metric"><div class="metric-label">Total geral</div><div class="metric-value">'+fmt(total)+'</div></div>' +
    '<div class="metric"><div class="metric-label">Seus gastos</div><div class="metric-value">'+fmt(eu)+'</div></div>' +
    '<div class="metric"><div class="metric-label">Gastos dela</div><div class="metric-value">'+fmt(esp)+'</div></div>';

  var html = '';
  ['Eu','Esposa'].forEach(function(who) {
    var whoTotal = totalByWho(who);
    if (whoTotal === 0) return;
    html += '<div class="rep-person-block"><div class="rep-person-name">'+(who==='Eu'?'Você':'Esposa')+'</div>';
    state.categories.forEach(function(c) {
      var v = state.expenses.filter(function(e){ return e.cat===c.id && e.who===who; }).reduce(function(s,e){ return s+e.val; }, 0);
      if (v !== 0) html += '<div class="rep-row"><span class="rep-label">'+c.name+'</span><span class="rep-val">'+fmt(v)+'</span></div>';
    });
    html += '</div>';
    if (who === 'Eu') html += '<div class="divider"></div>';
  });
  document.getElementById('rep-person').innerHTML = html || '<div class="empty">Sem dados</div>';

  var all = state.expenses.slice().sort(function(a,b){ return b.val-a.val; });
  var allHtml = all.map(function(e) {
    var c = catById(e.cat);
    var valCls = e.val < 0 ? 'negative' : '';
    return '<div class="exp-item">' +
      '<div class="exp-left">' +
        '<span class="exp-name">'+e.desc+'</span>' +
        '<span class="exp-meta"><span class="exp-cat" style="background:'+c.color+'"></span>'+e.who+' · '+e.date+' · '+c.name+'</span>' +
      '</div>' +
      '<span class="exp-val '+valCls+'">'+fmt(e.val)+'</span>' +
    '</div>';
  }).join('');
  document.getElementById('rep-all').innerHTML = allHtml || '<div class="empty">Sem lançamentos</div>';
}

document.getElementById('inp-date').value = new Date().toISOString().split('T')[0];
document.getElementById('month-label').textContent = new Date().toLocaleDateString('pt-BR',{month:'long',year:'numeric'});
loadState();
populateCatSelect();
renderAll();
</script>
