<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Paronetto's Green</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,wght@0,300;0,400;0,500;0,600;1,400&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #f2f7f4;
  --surface: #ffffff;
  --surface2: #e8f2ec;
  --border: rgba(15,110,86,0.10);
  --border2: rgba(15,110,86,0.22);
  --text: #0d2b20;
  --text2: #4a7a62;
  --text3: #89b09a;
  --green: #1D9E75;
  --green-dark: #0F6E56;
  --green-light: #d6f0e6;
  --green-xlight: #edf8f3;
  --amber: #b86e0a;
  --amber-light: #fef3e0;
  --red: #b52a2a;
  --red-light: #fdecea;
  --radius: 14px;
  --radius-sm: 9px;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'DM Sans', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }
header { background: var(--green-dark); padding: 0 20px; display: flex; align-items: center; justify-content: space-between; height: 56px; position: sticky; top: 0; z-index: 100; }
.logo { display: flex; align-items: center; gap: 10px; font-size: 17px; font-weight: 600; color: #fff; letter-spacing: -0.4px; }
.logo-pig { width: 32px; height: 32px; background: rgba(255,255,255,0.15); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 18px; }
.logo span { color: #a8e6cc; }
.month-nav { display: flex; align-items: center; gap: 6px; background: rgba(255,255,255,0.12); border-radius: 20px; padding: 4px 6px; }
.month-nav button { background: none; border: none; color: rgba(255,255,255,0.8); cursor: pointer; font-size: 16px; padding: 0 4px; line-height: 1; }
.month-nav button:hover { color: #fff; }
.month-nav span { font-size: 12px; color: #fff; font-family: 'DM Mono', monospace; min-width: 80px; text-align: center; }
nav { display: flex; background: var(--green-dark); padding: 0 20px; overflow-x: auto; }
nav button { background: none; border: none; border-bottom: 2px solid transparent; padding: 10px 16px; font-size: 13px; font-weight: 500; color: rgba(255,255,255,0.55); cursor: pointer; white-space: nowrap; font-family: 'DM Sans', sans-serif; transition: color 0.15s; }
nav button.active { color: #fff; border-bottom-color: #a8e6cc; }
nav button:hover:not(.active) { color: rgba(255,255,255,0.85); }
main { padding: 16px; max-width: 640px; margin: 0 auto; }
.page { display: none; }
.page.active { display: block; }
.metrics { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; margin-bottom: 14px; }
.metric { background: var(--surface); border-radius: var(--radius); padding: 14px 16px; border: 1px solid var(--border); }
.metric-label { font-size: 11px; font-weight: 600; color: var(--text3); text-transform: uppercase; letter-spacing: 0.07em; margin-bottom: 5px; }
.metric-value { font-size: 21px; font-weight: 600; color: var(--text); letter-spacing: -0.5px; font-family: 'DM Mono', monospace; }
.metric-value.warn { color: var(--amber); }
.metric-value.danger { color: var(--red); }
.metric-value.good { color: var(--green-dark); }
.alert { border-radius: var(--radius-sm); padding: 10px 14px; margin-bottom: 10px; font-size: 13px; font-weight: 500; border: 1px solid; }
.alert.warn { background: var(--amber-light); color: #7a4a0a; border-color: #f0c07a; }
.alert.danger { background: var(--red-light); color: #8b1a1a; border-color: #f5a5a5; }
.section-label { font-size: 11px; font-weight: 600; color: var(--text3); text-transform: uppercase; letter-spacing: 0.07em; margin: 18px 0 10px; }
.card { background: var(--surface); border-radius: var(--radius); border: 1px solid var(--border); overflow: hidden; margin-bottom: 10px; }
.cat-item { padding: 12px 16px; border-bottom: 1px solid var(--border); }
.cat-item:last-child { border-bottom: none; }
.cat-header { display: flex; align-items: center; gap: 8px; margin-bottom: 5px; }
.cat-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
.cat-name { font-size: 13px; font-weight: 500; flex: 1; color: var(--text); }
.cat-badge { font-size: 11px; font-weight: 600; padding: 2px 8px; border-radius: 20px; font-family: 'DM Mono', monospace; }
.cat-badge.ok { background: var(--green-light); color: var(--green-dark); }
.cat-badge.warn { background: var(--amber-light); color: #7a4a0a; }
.cat-badge.danger { background: var(--red-light); color: #8b1a1a; }
.cat-amounts { font-size: 12px; color: var(--text2); margin-bottom: 5px; font-family: 'DM Mono', monospace; }
.bar-bg { background: var(--surface2); border-radius: 4px; height: 5px; overflow: hidden; }
.bar-fill { height: 5px; border-radius: 4px; transition: width 0.4s ease; }
.exp-item { display: flex; justify-content: space-between; align-items: center; padding: 11px 16px; border-bottom: 1px solid var(--border); }
.exp-item:last-child { border-bottom: none; }
.exp-left { display: flex; flex-direction: column; gap: 2px; }
.exp-name { font-size: 14px; font-weight: 500; color: var(--text); }
.exp-meta { font-size: 11px; color: var(--text3); }
.exp-cat-dot { display: inline-block; width: 6px; height: 6px; border-radius: 50%; margin-right: 4px; vertical-align: middle; }
.exp-val { font-size: 14px; font-weight: 600; color: var(--text); font-family: 'DM Mono', monospace; }
.exp-val.negative { color: var(--green-dark); }
.form-card { background: var(--surface); border-radius: var(--radius); border: 1px solid var(--border); padding: 20px; margin-bottom: 12px; }
.form-group { margin-bottom: 13px; }
.form-label { font-size: 11px; font-weight: 600; color: var(--text2); text-transform: uppercase; letter-spacing: 0.06em; display: block; margin-bottom: 5px; }
.form-control { width: 100%; padding: 10px 12px; border-radius: var(--radius-sm); border: 1px solid var(--border2); font-size: 14px; font-family: 'DM Sans', sans-serif; background: var(--surface); color: var(--text); outline: none; transition: border-color 0.15s; }
.form-control:focus { border-color: var(--green); box-shadow: 0 0 0 3px rgba(29,158,117,0.1); }
.form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
.who-toggle { display: flex; gap: 8px; margin-bottom: 16px; }
.who-btn { flex: 1; padding: 10px; border-radius: var(--radius-sm); border: 1px solid var(--border2); background: var(--surface); font-size: 13px; font-weight: 500; cursor: pointer; font-family: 'DM Sans', sans-serif; color: var(--text2); transition: all 0.15s; }
.who-btn.active { background: var(--green-xlight); border-color: var(--green); color: var(--green-dark); font-weight: 600; }
.btn-submit { width: 100%; padding: 12px; border-radius: var(--radius-sm); background: var(--green-dark); color: #fff; border: none; font-size: 14px; font-weight: 600; font-family: 'DM Sans', sans-serif; cursor: pointer; transition: background 0.15s, transform 0.1s; margin-top: 4px; }
.btn-submit:hover { background: var(--green); }
.btn-submit:active { transform: scale(0.98); }
.btn-outline { width: 100%; padding: 12px; border-radius: var(--radius-sm); background: none; color: var(--green-dark); border: 1px solid var(--green); font-size: 14px; font-weight: 600; font-family: 'DM Sans', sans-serif; cursor: pointer; transition: all 0.15s; margin-top: 8px; }
.btn-outline:hover { background: var(--green-xlight); }
.budget-item { display: flex; align-items: center; gap: 10px; padding: 10px 0; border-bottom: 1px solid var(--border); }
.budget-item:last-child { border-bottom: none; }
.budget-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
.budget-name { font-size: 13px; font-weight: 500; flex: 1; color: var(--text); }
.budget-spent { font-size: 12px; color: var(--text3); font-family: 'DM Mono', monospace; min-width: 70px; text-align: right; }
.budget-input { width: 90px; padding: 6px 10px; border-radius: var(--radius-sm); border: 1px solid var(--border2); font-size: 13px; font-family: 'DM Mono', monospace; text-align: right; color: var(--text); outline: none; background: var(--surface); }
.budget-input:focus { border-color: var(--green); }
.rep-person-block { padding: 12px 16px; }
.rep-person-name { font-size: 13px; font-weight: 600; color: var(--green-dark); margin-bottom: 8px; display: flex; align-items: center; gap: 6px; }
.rep-person-avatar { width: 24px; height: 24px; border-radius: 50%; background: var(--green-light); display: flex; align-items: center; justify-content: center; font-size: 11px; font-weight: 600; color: var(--green-dark); }
.rep-row { display: flex; justify-content: space-between; padding: 5px 0; font-size: 13px; border-bottom: 1px solid var(--border); }
.rep-row:last-child { border-bottom: none; }
.rep-label { color: var(--text2); }
.rep-val { font-weight: 500; font-family: 'DM Mono', monospace; color: var(--text); }
.divider { height: 1px; background: var(--border); margin: 0 16px; }
.pig-summary { background: var(--green-dark); border-radius: var(--radius); padding: 16px 20px; margin-bottom: 14px; display: flex; align-items: center; gap: 14px; }
.pig-icon { font-size: 32px; }
.pig-text { flex: 1; }
.pig-title { font-size: 13px; color: rgba(255,255,255,0.7); margin-bottom: 2px; }
.pig-amount { font-size: 24px; font-weight: 600; color: #fff; font-family: 'DM Mono', monospace; letter-spacing: -0.5px; }
.pig-sub { font-size: 12px; color: rgba(255,255,255,0.55); margin-top: 2px; }
.empty { text-align: center; padding: 32px 20px; color: var(--text3); font-size: 14px; }
.loading { text-align: center; padding: 24px; color: var(--text3); font-size: 14px; }
.sync-indicator { display: flex; align-items: center; gap: 6px; font-size: 11px; color: rgba(255,255,255,0.6); }
.sync-dot { width: 6px; height: 6px; border-radius: 50%; background: #a8e6cc; }
.sync-dot.syncing { animation: pulse 1s infinite; background: #ffd700; }
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.3} }
.toast { position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%) translateY(80px); background: var(--green-dark); color: #fff; padding: 10px 20px; border-radius: 20px; font-size: 13px; font-weight: 500; transition: transform 0.3s ease; z-index: 999; pointer-events: none; }
.toast.show { transform: translateX(-50%) translateY(0); }
</style>
</head>
<body>

<header>
  <div class="logo">
    <div class="logo-pig">🐷</div>
    Paronetto's <span>Green</span>
  </div>
  <div style="display:flex;align-items:center;gap:10px;">
    <div class="sync-indicator"><div class="sync-dot" id="sync-dot"></div><span id="sync-label">ok</span></div>
    <div class="month-nav">
      <button onclick="changeMonth(-1)">&#8249;</button>
      <span id="month-label"></span>
      <button onclick="changeMonth(1)">&#8250;</button>
    </div>
  </div>
</header>

<nav>
  <button class="active" onclick="showPage('dash',this)">Painel</button>
  <button onclick="showPage('add',this)">+ Registrar</button>
  <button onclick="showPage('budget',this)">Orçamento</button>
  <button onclick="showPage('report',this)">Relatório</button>
</nav>

<main>
<div id="dash" class="page active">
  <div style="height:14px;"></div>
  <div class="pig-summary">
    <div class="pig-icon">🐷</div>
    <div class="pig-text">
      <div class="pig-title" id="pig-title">total gasto</div>
      <div class="pig-amount" id="pig-total">R$ 0,00</div>
      <div class="pig-sub" id="pig-sub"></div>
    </div>
  </div>
  <div class="metrics" id="dash-metrics"></div>
  <div id="dash-alerts"></div>
  <div class="section-label">por categoria</div>
  <div class="card" id="dash-cats"></div>
  <div class="section-label">últimos lançamentos</div>
  <div class="card" id="dash-recent"></div>
</div>

<div id="add" class="page">
  <div style="height:14px;"></div>
  <div class="form-card">
    <div class="section-label" style="margin-top:0;">quem pagou</div>
    <div class="who-toggle">
      <button class="who-btn active" id="who-filipe" onclick="setWho('Filipe')">🧔 Filipe</button>
      <button class="who-btn" id="who-beatriz" onclick="setWho('Beatriz')">👩 Beatriz</button>
    </div>

    <input type="file" id="ocr-input" accept="image/*" capture="environment" style="display:none;" onchange="handleOCR(this)">
    <button class="btn-outline" style="margin-bottom:16px;margin-top:0;" onclick="document.getElementById('ocr-input').click()">
      📷 Ler nota fiscal
    </button>
    <div id="ocr-preview" style="display:none;margin-bottom:14px;border-radius:var(--radius-sm);overflow:hidden;border:1px solid var(--border2);">
      <img id="ocr-img" style="width:100%;max-height:200px;object-fit:cover;">
      <div id="ocr-status" style="padding:10px 14px;font-size:13px;color:var(--text2);background:var(--surface2);">Lendo nota...</div>
    </div>

    <div class="form-group">
      <label class="form-label">Descrição</label>
      <input class="form-control" id="inp-desc" placeholder="Ex: Mercado, Farmácia...">
    </div>
    <div class="form-row">
      <div class="form-group">
        <label class="form-label">Valor (R$)</label>
        <input class="form-control" id="inp-val" type="number" step="0.01" min="0" placeholder="0,00">
      </div>
      <div class="form-group">
        <label class="form-label">Data</label>
        <input class="form-control" id="inp-date" type="date">
      </div>
    </div>
    <div class="form-group">
      <label class="form-label">Categoria</label>
      <select class="form-control" id="inp-cat"></select>
    </div>
    <button class="btn-submit" id="btn-add" onclick="addExpense()">Registrar gasto</button>
  </div>
</div>

<div id="budget" class="page">
  <div style="height:14px;"></div>
  <div class="form-card">
    <div class="section-label" style="margin-top:0;">limites mensais por categoria</div>
    <div id="budget-list"></div>
  </div>
  <div class="form-card">
    <div class="section-label" style="margin-top:0;">nova categoria</div>
    <div class="form-group">
      <label class="form-label">Nome</label>
      <input class="form-control" id="new-cat-name" placeholder="Ex: Lazer, Academia...">
    </div>
    <div class="form-row">
      <div class="form-group">
        <label class="form-label">Limite (R$)</label>
        <input class="form-control" id="new-cat-limit" type="number" placeholder="500">
      </div>
      <div class="form-group">
        <label class="form-label">Cor</label>
        <select class="form-control" id="new-cat-color">
          <option value="#1D9E75">Verde</option>
          <option value="#2563eb">Azul</option>
          <option value="#D85A30">Laranja</option>
          <option value="#7F77DD">Roxo</option>
          <option value="#D4537E">Rosa</option>
          <option value="#c97c1a">Âmbar</option>
          <option value="#888780">Cinza</option>
          <option value="#c53030">Vermelho</option>
        </select>
      </div>
    </div>
    <button class="btn-submit" onclick="addCategory()">Adicionar categoria</button>
  </div>
</div>

<div id="report" class="page">
  <div style="height:14px;"></div>
  <div class="metrics" id="rep-metrics"></div>
  <div class="section-label">por pessoa</div>
  <div class="card" id="rep-person"></div>
  <div class="section-label">todos os lançamentos</div>
  <div class="card" id="rep-all"></div>
  <button class="btn-outline" onclick="exportCSV()">Exportar extrato CSV</button>
  <div style="height:20px;"></div>
</div>
</main>

<div class="toast" id="toast"></div>

<script>
var SUPABASE_URL = 'https://ygnpddidjmvdievprof.supabase.co';
var SUPABASE_KEY = 'sb_publishable_oaxikaD0uILb1LxGjErRdw_vVWBit5m';

var selectedWho = 'Filipe';
var currentYear = new Date().getFullYear();
var currentMonth = new Date().getMonth();
var MONTHS = ['janeiro','fevereiro','março','abril','maio','junho','julho','agosto','setembro','outubro','novembro','dezembro'];

var categories = [];
var expenses = [];

async function fetchCategories() {
  try {
    var res = await fetch(SUPABASE_URL + '/rest/v1/categories?order=name.asc', {
      headers: { 'apikey': SUPABASE_KEY, 'Authorization': 'Bearer ' + SUPABASE_KEY }
    });
    if (res.ok) {
      categories = await res.json();
      populateCatSelect();
      renderAll();
    }
  } catch(e) { showToast('Erro ao buscar categorias'); }
}

async function insertCategory(cat) {
  var res = await fetch(SUPABASE_URL + '/rest/v1/categories', {
    method: 'POST',
    headers: {
      'apikey': SUPABASE_KEY, 'Authorization': 'Bearer ' + SUPABASE_KEY,
      'Content-Type': 'application/json', 'Prefer': 'return=representation'
    },
    body: JSON.stringify(cat)
  });
  if (!res.ok) throw new Error('Erro ao salvar categoria');
  return await res.json();
}

async function deleteCategDB(id) {
  var res = await fetch(SUPABASE_URL + '/rest/v1/categories?id=eq.' + encodeURIComponent(id), {
    method: 'DELETE',
    headers: { 'apikey': SUPABASE_KEY, 'Authorization': 'Bearer ' + SUPABASE_KEY }
  });
  if (!res.ok) throw new Error('Erro ao deletar');
}

async function updateLimitDB(id, limit) {
  var res = await fetch(SUPABASE_URL + '/rest/v1/categories?id=eq.' + encodeURIComponent(id), {
    method: 'PATCH',
    headers: {
      'apikey': SUPABASE_KEY, 'Authorization': 'Bearer ' + SUPABASE_KEY,
      'Content-Type': 'application/json'
    },
    body: JSON.stringify({ limit: limit })
  });
  if (!res.ok) throw new Error('Erro ao atualizar limite');
}

function saveCategories() {}

function setSyncing(on) {
  var dot = document.getElementById('sync-dot');
  var lbl = document.getElementById('sync-label');
  if (on) { dot.classList.add('syncing'); lbl.textContent = 'sync...'; }
  else     { dot.classList.remove('syncing'); lbl.textContent = 'ok'; }
}

async function fetchExpenses() {
  setSyncing(true);
  try {
    var key = getMonthKey();
    var from = key + '-01';
    var to   = key + '-31';
    var res = await fetch(
      SUPABASE_URL + '/rest/v1/expenses?date=gte.' + from + '&date=lte.' + to + '&order=id.asc',
      { headers: { 'apikey': SUPABASE_KEY, 'Authorization': 'Bearer ' + SUPABASE_KEY } }
    );
    if (res.ok) {
      expenses = await res.json();
      renderAll();
    }
  } catch(e) { showToast('Erro ao buscar dados'); }
  setSyncing(false);
}

async function insertExpense(exp) {
  var res = await fetch(SUPABASE_URL + '/rest/v1/expenses', {
    method: 'POST',
    headers: {
      'apikey': SUPABASE_KEY,
      'Authorization': 'Bearer ' + SUPABASE_KEY,
      'Content-Type': 'application/json',
      'Prefer': 'return=representation'
    },
    body: JSON.stringify(exp)
  });
  if (!res.ok) throw new Error('Erro ao salvar');
  return await res.json();
}

function fmt(v) {
  return 'R$ ' + parseFloat(v).toLocaleString('pt-BR', {minimumFractionDigits:2, maximumFractionDigits:2});
}
function catById(id) {
  return categories.find(function(c){ return c.id===id; }) || {name:id, color:'#888', limit:0};
}
function getMonthKey() {
  return currentYear + '-' + String(currentMonth+1).padStart(2,'0');
}
function totalByCat(catId) {
  return expenses.filter(function(e){ return e.cat===catId; }).reduce(function(s,e){ return s+parseFloat(e.val); },0);
}
function totalByWho(who) {
  return expenses.filter(function(e){ return e.who===who; }).reduce(function(s,e){ return s+parseFloat(e.val); },0);
}
function updateMonthLabel() {
  document.getElementById('month-label').textContent = MONTHS[currentMonth] + ' ' + currentYear;
}
function changeMonth(dir) {
  currentMonth += dir;
  if (currentMonth > 11) { currentMonth = 0; currentYear++; }
  if (currentMonth < 0)  { currentMonth = 11; currentYear--; }
  updateMonthLabel();
  fetchExpenses();
}
function showPage(id, btn) {
  document.querySelectorAll('.page').forEach(function(p){ p.classList.remove('active'); });
  document.querySelectorAll('nav button').forEach(function(b){ b.classList.remove('active'); });
  document.getElementById(id).classList.add('active');
  btn.classList.add('active');
  renderAll();
}
function setWho(who) {
  selectedWho = who;
  document.getElementById('who-filipe').classList.toggle('active', who==='Filipe');
  document.getElementById('who-beatriz').classList.toggle('active', who==='Beatriz');
}
function showToast(msg) {
  var t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(function(){ t.classList.remove('show'); }, 2500);
}
function renderAll() { renderDash(); renderBudget(); renderReport(); }

function renderDash() {
  var total = expenses.reduce(function(s,e){ return s+parseFloat(e.val); },0);
  var totalLimit = categories.reduce(function(s,c){ return s+c.limit; },0);
  var pct = totalLimit>0 ? Math.round(total/totalLimit*100) : 0;
  var cls = pct>=100?'danger':pct>=80?'warn':'good';
  var restante = totalLimit - total;

  document.getElementById('pig-title').textContent = 'total gasto em ' + MONTHS[currentMonth];
  document.getElementById('pig-total').textContent = fmt(total);
  document.getElementById('pig-sub').textContent = restante>=0
    ? 'Restam '+fmt(restante)+' do orçamento'
    : 'Orçamento estourado em '+fmt(Math.abs(restante));

  document.getElementById('dash-metrics').innerHTML =
    '<div class="metric"><div class="metric-label">Orçamento total</div><div class="metric-value">'+fmt(totalLimit)+'</div></div>'+
    '<div class="metric"><div class="metric-label">Utilizado</div><div class="metric-value '+cls+'">'+pct+'%</div></div>'+
    '<div class="metric"><div class="metric-label">Filipe</div><div class="metric-value">'+fmt(totalByWho('Filipe'))+'</div></div>'+
    '<div class="metric"><div class="metric-label">Beatriz</div><div class="metric-value">'+fmt(totalByWho('Beatriz'))+'</div></div>';

  var alerts='';
  categories.forEach(function(c){
    var spent=totalByCat(c.id);
    if(spent===0) return;
    var p=c.limit>0?spent/c.limit:0;
    if(p>=1) alerts+='<div class="alert danger">Limite estourado: <strong>'+c.name+'</strong> — '+fmt(spent)+' de '+fmt(c.limit)+'</div>';
    else if(p>=0.8) alerts+='<div class="alert warn">Atenção: <strong>'+c.name+'</strong> em '+Math.round(p*100)+'% — '+fmt(spent)+' de '+fmt(c.limit)+'</div>';
  });
  document.getElementById('dash-alerts').innerHTML=alerts;

  var sorted=categories.slice().sort(function(a,b){ return totalByCat(b.id)-totalByCat(a.id); });
  var catsHtml='';
  sorted.forEach(function(c){
    var spent=totalByCat(c.id);
    if(spent<=0) return;
    var p=c.limit>0?Math.min(spent/c.limit,1):0;
    var pPct=Math.round(p*100);
    var badgeCls=pPct>=100?'danger':pPct>=80?'warn':'ok';
    var barColor=pPct>=100?'#b52a2a':pPct>=80?'#b86e0a':c.color;
    catsHtml+='<div class="cat-item"><div class="cat-header"><div class="cat-dot" style="background:'+c.color+'"></div><span class="cat-name">'+c.name+'</span><span class="cat-badge '+badgeCls+'">'+pPct+'%</span></div><div class="cat-amounts">'+fmt(spent)+' de '+fmt(c.limit)+'</div><div class="bar-bg"><div class="bar-fill" style="width:'+Math.round(p*100)+'%;background:'+barColor+'"></div></div></div>';
  });
  document.getElementById('dash-cats').innerHTML=catsHtml||'<div class="empty">Nenhum gasto em '+MONTHS[currentMonth]+'</div>';

  var recent=expenses.slice().reverse().slice(0,6);
  var recentHtml=recent.map(function(e){
    var c=catById(e.cat);
    return '<div class="exp-item"><div class="exp-left"><span class="exp-name">'+e.desc+'</span><span class="exp-meta"><span class="exp-cat-dot" style="background:'+c.color+'"></span>'+e.who+' · '+e.date+'</span></div><span class="exp-val'+(parseFloat(e.val)<0?' negative':'')+'">'+fmt(e.val)+'</span></div>';
  }).join('');
  document.getElementById('dash-recent').innerHTML=recentHtml||'<div class="empty">Nenhum lançamento em '+MONTHS[currentMonth]+'</div>';
}

function renderBudget() {
  var html='';
  if(categories.length===0){
    html='<div class="empty">Nenhuma categoria. Crie uma abaixo!</div>';
  }
  categories.forEach(function(c){
    var spent=totalByCat(c.id);
    html+='<div class="budget-item"><div class="budget-dot" style="background:'+c.color+'"></div><span class="budget-name">'+c.name+'</span><span class="budget-spent">'+fmt(spent)+'</span><input class="budget-input" type="number" value="'+c.limit+'" onchange="updateLimit(\''+c.id+'\',this.value)"><button onclick="deleteCategory(\''+c.id+'\')" style="background:none;border:none;color:var(--color-text-tertiary, #aaa);cursor:pointer;font-size:16px;padding:0 0 0 8px;line-height:1;" title="Deletar categoria">&#x2715;</button></div>';
  });
  document.getElementById('budget-list').innerHTML=html;
}

async function deleteCategory(id){
  if(!confirm('Deletar esta categoria? Os gastos vinculados a ela não serão apagados.')) return;
  setSyncing(true);
  try {
    await deleteCategDB(id);
    await fetchCategories();
    showToast('Categoria removida');
  } catch(e) { showToast('Erro ao deletar categoria'); }
  setSyncing(false);
}

async function updateLimit(id,val){
  var limit = parseFloat(val)||0;
  var c=categories.find(function(c){ return c.id===id; });
  if(c){ c.limit=limit; renderAll(); }
  try {
    await updateLimitDB(id, limit);
    showToast('Limite atualizado');
  } catch(e) { showToast('Erro ao atualizar limite'); }
}

async function addCategory(){
  var name=document.getElementById('new-cat-name').value.trim();
  var limit=parseFloat(document.getElementById('new-cat-limit').value)||0;
  var color=document.getElementById('new-cat-color').value;
  if(!name){ showToast('Digite um nome'); return; }
  var btn = document.getElementById('btn-add-cat') || document.querySelector('#budget .btn-submit');
  try {
    var newCat = {id:'cat-'+Date.now(), name:name, color:color, limit:limit};
    await insertCategory(newCat);
    document.getElementById('new-cat-name').value='';
    document.getElementById('new-cat-limit').value='';
    await fetchCategories();
    showToast('Categoria adicionada');
  } catch(e) { showToast('Erro ao salvar categoria'); }
}

function populateCatSelect(){
  var sel=document.getElementById('inp-cat');
  if(!sel) return;
  sel.innerHTML=categories.map(function(c){ return '<option value="'+c.id+'">'+c.name+'</option>'; }).join('');
}

async function addExpense(){
  var desc=document.getElementById('inp-desc').value.trim();
  var val=parseFloat(document.getElementById('inp-val').value);
  var cat=document.getElementById('inp-cat').value;
  var date=document.getElementById('inp-date').value;
  if(!desc||!val||!date){ showToast('Preencha todos os campos'); return; }
  var btn=document.getElementById('btn-add');
  btn.textContent='Salvando...'; btn.disabled=true;
  setSyncing(true);
  try {
    var newExp = {who:selectedWho, desc:desc, val:val, cat:cat, date:date};
    var result = await insertExpense(newExp);
    expenses = expenses.concat(result);
    document.getElementById('inp-desc').value='';
    document.getElementById('inp-val').value='';
    showToast('Gasto registrado!');
    showPage('dash', document.querySelector('nav button'));
    renderAll();
  } catch(e) {
    showToast('Erro ao salvar. Tente novamente.');
  }
  btn.textContent='Registrar gasto'; btn.disabled=false;
  setSyncing(false);
}

function renderReport(){
  var total=expenses.reduce(function(s,e){ return s+parseFloat(e.val); },0);
  document.getElementById('rep-metrics').innerHTML=
    '<div class="metric"><div class="metric-label">Total</div><div class="metric-value">'+fmt(total)+'</div></div>'+
    '<div class="metric"><div class="metric-label">Lançamentos</div><div class="metric-value good">'+expenses.length+'</div></div>'+
    '<div class="metric"><div class="metric-label">Filipe</div><div class="metric-value">'+fmt(totalByWho('Filipe'))+'</div></div>'+
    '<div class="metric"><div class="metric-label">Beatriz</div><div class="metric-value">'+fmt(totalByWho('Beatriz'))+'</div></div>';

  var html='';
  ['Filipe','Beatriz'].forEach(function(who){
    var whoTotal=totalByWho(who);
    if(whoTotal===0) return;
    var initials=who==='Filipe'?'FP':'BP';
    html+='<div class="rep-person-block"><div class="rep-person-name"><div class="rep-person-avatar">'+initials+'</div>'+who+'</div>';
    categories.forEach(function(c){
      var v=expenses.filter(function(e){ return e.cat===c.id&&e.who===who; }).reduce(function(s,e){ return s+parseFloat(e.val); },0);
      if(v!==0) html+='<div class="rep-row"><span class="rep-label">'+c.name+'</span><span class="rep-val">'+fmt(v)+'</span></div>';
    });
    html+='</div>';
    if(who==='Filipe') html+='<div class="divider"></div>';
  });
  document.getElementById('rep-person').innerHTML=html||'<div class="empty">Sem dados em '+MONTHS[currentMonth]+'</div>';

  var all=expenses.slice().sort(function(a,b){ return parseFloat(b.val)-parseFloat(a.val); });
  var allHtml=all.map(function(e){
    var c=catById(e.cat);
    return '<div class="exp-item"><div class="exp-left"><span class="exp-name">'+e.desc+'</span><span class="exp-meta"><span class="exp-cat-dot" style="background:'+c.color+'"></span>'+e.who+' · '+e.date+' · '+c.name+'</span></div><div style="display:flex;align-items:center;gap:10px;"><span class="exp-val'+(parseFloat(e.val)<0?' negative':'')+'">'+fmt(e.val)+'</span><button onclick="deleteExpense('+e.id+')" style="background:none;border:none;color:var(--color-text-tertiary,#aaa);cursor:pointer;font-size:15px;padding:0;line-height:1;" title="Deletar">&#x2715;</button></div></div>';
  }).join('');
  document.getElementById('rep-all').innerHTML=allHtml||'<div class="empty">Sem lançamentos em '+MONTHS[currentMonth]+'</div>';
}

function exportCSV(){
  if(expenses.length===0){ showToast('Nenhum lançamento neste mês'); return; }
  var sorted=expenses.slice().sort(function(a,b){ return a.date.localeCompare(b.date); });
  var lines=['\uFEFFData;Descrição;Quem;Categoria;Valor (R$)'];
  sorted.forEach(function(e){
    var c=catById(e.cat);
    var val=parseFloat(e.val).toFixed(2).replace('.',',');
    lines.push([e.date,e.desc,e.who,c.name,val].join(';'));
  });
  var total=expenses.reduce(function(s,e){ return s+parseFloat(e.val); },0);
  lines.push(';;;Total;'+total.toFixed(2).replace('.',','));
  var blob=new Blob([lines.join('\n')],{type:'text/csv;charset=utf-8;'});
  var url=URL.createObjectURL(blob);
  var a=document.createElement('a');
  a.href=url; a.download='extrato-'+MONTHS[currentMonth]+'-'+currentYear+'.csv'; a.click();
  URL.revokeObjectURL(url);
  showToast('Extrato exportado!');
}

async function deleteExpense(id){
  if(!confirm('Deletar este lançamento?')) return;
  setSyncing(true);
  try {
    var res = await fetch(SUPABASE_URL+'/rest/v1/expenses?id=eq.'+id, {
      method: 'DELETE',
      headers: { 'apikey': SUPABASE_KEY, 'Authorization': 'Bearer '+SUPABASE_KEY }
    });
    if(res.ok){
      expenses = expenses.filter(function(e){ return e.id!==id; });
      renderAll();
      showToast('Lançamento removido');
    } else { showToast('Erro ao deletar'); }
  } catch(e){ showToast('Erro ao deletar'); }
  setSyncing(false);
}

async function handleOCR(input) {
  var file = input.files[0];
  if (!file) return;

  var preview = document.getElementById('ocr-preview');
  var img = document.getElementById('ocr-img');
  var status = document.getElementById('ocr-status');
  preview.style.display = 'block';
  status.textContent = 'Lendo nota...';

  var reader = new FileReader();
  reader.onload = async function(e) {
    img.src = e.target.result;
    var base64 = e.target.result.split(',')[1];
    var mediaType = file.type || 'image/jpeg';

    try {
      var response = await fetch('https://api.anthropic.com/v1/messages', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          model: 'claude-sonnet-4-20250514',
          max_tokens: 500,
          messages: [{
            role: 'user',
            content: [
              {
                type: 'image',
                source: { type: 'base64', media_type: mediaType, data: base64 }
              },
              {
                type: 'text',
                text: 'Analise esse cupom fiscal ou nota e extraia: 1) o valor TOTAL pago (número apenas, ex: 47.50), 2) o nome do estabelecimento ou tipo de compra (ex: Mercado Extra, Farmácia), 3) a data no formato YYYY-MM-DD. Responda APENAS em JSON assim: {"valor": 47.50, "descricao": "Mercado Extra", "data": "2026-03-18"}. Se não conseguir identificar algum campo, use null.'
              }
            ]
          }]
        })
      });

      var data = await response.json();
      var text = data.content && data.content[0] ? data.content[0].text : '';
      var clean = text.replace(/```json|```/g, '').trim();
      var parsed = JSON.parse(clean);

      if (parsed.valor) document.getElementById('inp-val').value = parsed.valor;
      if (parsed.descricao) document.getElementById('inp-desc').value = parsed.descricao;
      if (parsed.data) document.getElementById('inp-date').value = parsed.data;

      status.textContent = 'Nota lida! Confira os campos abaixo.';
      status.style.color = 'var(--green-dark)';
    } catch(e) {
      status.textContent = 'Não consegui ler a nota. Preencha manualmente.';
      status.style.color = 'var(--red)';
    }
  };
  reader.readAsDataURL(file);
}

document.getElementById('inp-date').value=new Date().toISOString().split('T')[0];
updateMonthLabel();
fetchCategories();
fetchExpenses();

setInterval(fetchExpenses, 30000);
</script>
